services:
  gwiki:
    image: ${GWIKI_IMAGE:-gwiki:latest}
    ports:
      - "8080:8080"
    volumes:
      - "${WIKI_REPO_PATH_HOST:-.}:/notes"
      - "${WIKI_DATA_PATH_HOST:-./.wiki}:/data"
      - "${GIT_HOME_HOST:-./git-home}:/git-home"
      - "${LOG_PATH_HOST:-./log}:/app/log"
    user: "${UID:-1000}:${GID:-1000}"
    environment:
      - DEV=${DEV:-}
      - HOME=/home/gwiki
      - GIT_CONFIG_GLOBAL=/git-home/.gitconfig
      - GIT_CREDENTIALS_FILE=/git-home/.git-credentials
      - WIKI_REPO_PATH=/notes
      - WIKI_DATA_PATH=/data
      - WIKI_DEV_LOG_FILE=/app/log/dev.log
      - TZ=${TZ:-Asia/Jakarta}

  e2e:
    build:
      context: .
      dockerfile: Dockerfile.e2e
    image: gwiki-e2e:latest
    depends_on:
      - gwiki
    working_dir: /work/tests/e2e
    volumes:
      - .:/work
    environment:
      - E2E_BASE_URL=http://gwiki:8080
      - E2E_AUTH_USER=${E2E_AUTH_USER:-test}
      - E2E_AUTH_PASS=${E2E_AUTH_PASS:-test}
      - NODE_PATH=/playwright-npm/node_modules
    command: ["go", "test", "-v", "./..."]

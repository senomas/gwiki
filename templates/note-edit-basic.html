{{define "note_edit_basic"}}
<div class="relative">
  <textarea class="min-h-[60vh] w-full rounded-xl border border-slate-800/80 bg-[#0f1216] p-4 font-mono text-sm text-slate-100 shadow-[inset_0_0_0_1px_rgba(15,23,42,0.5)] focus:border-slate-500 focus:outline-none focus:ring-2 focus:ring-sky-500/40" id="note-content" name="content" data-cmd-trigger="{{.EditCommandTrigger}}" data-cmd-todo="{{.EditCommandTodo}}" data-cmd-today="{{.EditCommandToday}}" data-cmd-time="{{.EditCommandTime}}" data-cmd-date-base="{{.EditCommandDateBase}}">{{.RawContent}}</textarea>
  <div id="tag-suggest" class="absolute z-10 hidden" aria-live="polite"></div>
</div>
{{end}}

{{define "note_edit_basic_assets"}}
{{template "note_edit_actions" .}}
<script id="tag-suggestions-by-owner-data" type="application/json">{{toJSON .TagSuggestionsByOwner}}</script>
<script>
  (function () {
    var textarea = document.getElementById("note-content");
    if (!textarea) {
      return;
    }
    window.setTimeout(function () {
      textarea.focus();
      textarea.selectionStart = textarea.selectionEnd = textarea.value.length;
    }, 0);
    var cmdTrigger = (textarea.getAttribute("data-cmd-trigger") || "!").trim() || "!";
    var cmdTodoToken = (textarea.getAttribute("data-cmd-todo") || "!").trim() || "!";
    var cmdTodayToken = (textarea.getAttribute("data-cmd-today") || "d").trim() || "d";
    var cmdTimeToken = (textarea.getAttribute("data-cmd-time") || "t").trim() || "t";
    var cmdDateBaseToken = (textarea.getAttribute("data-cmd-date-base") || "d").trim() || "d";
    var cmdTodo = cmdTrigger + cmdTodoToken;
    var cmdToday = cmdTrigger + cmdTodayToken;
    var cmdDateBase = cmdTrigger + cmdDateBaseToken;
    var cmdTime = cmdTrigger + cmdTimeToken;
    var commandState = {
      active: false,
      start: 0
    };
    textarea.addEventListener("input", function (event) {
      var value = textarea.value;
      var caret = textarea.selectionStart || 0;
      if (caret < 2) {
        commandState.active = false;
        return;
      }
      var lineStart = value.lastIndexOf("\n", caret - 1);
      if (lineStart === -1) {
        lineStart = 0;
      } else {
        lineStart += 1;
      }
      var line = value.slice(lineStart, caret);
      var firstNonSpace = line.search(/\S/);
      if (firstNonSpace === -1) {
        commandState.active = false;
        return;
      }
      var cmdStart = commandState.active ? commandState.start : -1;
      if (cmdStart < lineStart || cmdStart >= caret) {
        commandState.active = false;
        cmdStart = -1;
      }
      if (!commandState.active) {
        var lastTrigger = line.lastIndexOf(cmdTrigger);
        if (lastTrigger === -1) {
          return;
        }
        var triggerIndex = lastTrigger;
        if (cmdTodoToken === cmdTrigger && lastTrigger > 0 && line[lastTrigger - 1] === cmdTrigger) {
          triggerIndex = lastTrigger - 1;
        }
        cmdStart = lineStart + triggerIndex;
        commandState.active = true;
        commandState.start = cmdStart;
      }
      var cmdSegment = value.slice(cmdStart, caret);
      var cmdTrim = cmdSegment.trim();
      if (!event || event.inputType !== "insertText" || event.data !== " ") {
        if (cmdTrim.length >= 5) {
          commandState.active = false;
        }
        return;
      }
      if (!commandState.active || commandState.start !== cmdStart) {
        return;
      }
      if (cmdTrim.length > 5) {
        commandState.active = false;
        return;
      }
      var lineBeforeCmd = line.slice(0, cmdStart - lineStart).trim();
      var replacement = "";
      if (cmdTrim === cmdTodo && lineBeforeCmd === "") {
        replacement = line.slice(0, cmdStart - lineStart) + "- [ ] ";
      } else if (cmdTrim === cmdToday) {
        var months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
        var now = new Date();
        replacement = line.slice(0, cmdStart - lineStart) + now.getDate() + " " + months[now.getMonth()] + " " + now.getFullYear() + " ";
      } else if (cmdTrim && cmdTrim.indexOf(cmdDateBase) === 0) {
        var suffix = cmdTrim.slice(cmdDateBase.length);
        var match = suffix.match(/^([+-]?)(\d+)$/);
        if (match) {
          var sign = match[1] || "+";
          var amount = parseInt(match[2], 10);
          if (!isNaN(amount)) {
            if (sign === "-") {
              amount = -amount;
            }
            var months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
            var base = new Date();
            base.setDate(base.getDate() + amount);
            replacement = line.slice(0, cmdStart - lineStart) + base.getDate() + " " + months[base.getMonth()] + " " + base.getFullYear() + " ";
          }
        }
      } else if (cmdTrim === cmdTime) {
        var nowTime = new Date();
        var pad = function (value) {
          return String(value).padStart(2, "0");
        };
        replacement = line.slice(0, cmdStart - lineStart) + pad(nowTime.getHours()) + ":" + pad(nowTime.getMinutes()) + ":" + pad(nowTime.getSeconds()) + " ";
      }
      if (replacement) {
        textarea.setRangeText(replacement, lineStart, caret, "end");
      }
      commandState.active = false;
    });
  })();
</script>
<script>
  (function () {
    var textarea = document.getElementById("note-content");
    var launcher = document.getElementById("note-edit-actions");
    var input = document.getElementById("note-edit-actions-input");
    var list = document.getElementById("note-edit-actions-list");
    var dynamic = document.getElementById("note-edit-actions-dynamic");
    if (!textarea || !launcher || !input || !list || !dynamic || !window.htmx) {
      return;
    }

    function openLauncher() {
      launcher.classList.add("is-open");
      launcher.setAttribute("aria-hidden", "false");
      input.value = "";
      dynamic.innerHTML = "";
      dynamic.classList.add("hidden");
      filterDefaultActions("");
      clearActive();
      applyItemLimit();
      input.focus();
    }

    function closeLauncher() {
      launcher.classList.remove("is-open");
      launcher.setAttribute("aria-hidden", "true");
      textarea.focus();
    }

    function listVisibleItems() {
      return Array.prototype.filter.call(list.querySelectorAll(".quick-launcher__item"), function (item) {
        return !item.classList.contains("hidden") && !item.classList.contains("quick-launcher__item--capped") && item.offsetParent !== null;
      });
    }

    function applyItemLimit() {
      var items = list.querySelectorAll(".quick-launcher__item");
      var visibleCount = 0;
      items.forEach(function (item) {
        item.classList.remove("quick-launcher__item--capped");
        if (item.classList.contains("hidden")) {
          return;
        }
        visibleCount += 1;
        if (visibleCount > 10) {
          item.classList.add("quick-launcher__item--capped");
        }
      });
    }

    function normalizeQuery(value) {
      return (value || "").toLowerCase().replace(/[^a-z0-9]+/g, "");
    }

    function filterDefaultActions(query) {
      var term = normalizeQuery(query);
      var items = list.querySelectorAll("[data-action]");
      items.forEach(function (item) {
        if (!term) {
          item.classList.remove("hidden");
          return;
        }
        var label = (item.getAttribute("data-label") || "").toLowerCase();
        var hint = (item.getAttribute("data-hint") || "").toLowerCase();
        var candidate = normalizeQuery(label + " " + hint);
        if (candidate.indexOf(term) !== -1) {
          item.classList.remove("hidden");
        } else {
          item.classList.add("hidden");
        }
      });
    }

    function clearActive() {
      listVisibleItems().forEach(function (item) {
        item.classList.remove("is-active");
      });
    }

    function activateIndex(index) {
      var items = listVisibleItems();
      if (!items.length) {
        return;
      }
      var target = items[index];
      if (!target) {
        return;
      }
      items.forEach(function (item) {
        item.classList.toggle("is-active", item === target);
      });
      target.scrollIntoView({block: "nearest"});
    }

    function activeIndex() {
      var items = listVisibleItems();
      for (var i = 0; i < items.length; i++) {
        if (items[i].classList.contains("is-active")) {
          return i;
        }
      }
      return -1;
    }

    function moveActive(delta) {
      var items = listVisibleItems();
      if (!items.length) {
        return;
      }
      var index = activeIndex();
      var nextIndex = index + delta;
      if (index < 0) {
        nextIndex = delta > 0 ? 0 : items.length - 1;
      }
      if (nextIndex < 0) {
        nextIndex = items.length - 1;
      }
      if (nextIndex >= items.length) {
        nextIndex = 0;
      }
      activateIndex(nextIndex);
    }

    function insertText(insert) {
      var start = textarea.selectionStart || 0;
      var end = textarea.selectionEnd || 0;
      textarea.setRangeText(insert, start, end, "end");
      textarea.focus();
    }

    function formatDate(now) {
      var months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
      return now.getDate() + " " + months[now.getMonth()] + " " + now.getFullYear();
    }

    function addDays(now, amount) {
      var next = new Date(now.getTime());
      next.setDate(next.getDate() + amount);
      return next;
    }

    function addMonths(now, amount) {
      var next = new Date(now.getTime());
      next.setMonth(next.getMonth() + amount);
      return next;
    }

    function formatTime(now) {
      var pad = function (value) {
        return String(value).padStart(2, "0");
      };
      return pad(now.getHours()) + ":" + pad(now.getMinutes()) + ":" + pad(now.getSeconds());
    }

    function handleAction(action) {
      var now = new Date();
      if (action === "todo") {
        insertText("- [ ] ");
      } else if (action === "date") {
        insertText(formatDate(now) + " ");
      } else if (action === "time") {
        insertText(formatTime(now) + " ");
      } else if (action === "tomorrow") {
        insertText(formatDate(addDays(now, 1)) + " ");
      } else if (action === "next-week") {
        insertText(formatDate(addDays(now, 7)) + " ");
      } else if (action === "next-month") {
        insertText(formatDate(addMonths(now, 1)) + " ");
      }
      closeLauncher();
    }

    function handleTag(tag) {
      var value = (tag || "").replace(/^#/, "");
      if (!value) {
        return;
      }
      insertText("#" + value + " ");
      closeLauncher();
    }

    function toOwnerScopedWikiPath(path) {
      var value = (path || "").trim();
      if (!value) {
        return "";
      }
      if (value.charAt(0) === "@") {
        return value;
      }
      if (value.charAt(0) === "/") {
        value = value.slice(1);
      }
      if (value.indexOf("notes/") === 0) {
        value = value.slice("notes/".length);
      }
      var slashIndex = value.indexOf("/");
      if (slashIndex <= 0 || slashIndex >= value.length - 1) {
        return value;
      }
      return "@" + value;
    }

    function handleNote(path) {
      var value = toOwnerScopedWikiPath(path);
      if (!value) {
        return;
      }
      insertText("[[" + value + "]] ");
      closeLauncher();
    }

    function handleItem(target) {
      if (!target) {
        return;
      }
      var action = target.getAttribute("data-action");
      if (action) {
        handleAction(action);
        return;
      }
      var tag = target.getAttribute("data-tag");
      if (tag) {
        handleTag(tag);
        return;
      }
      var notePath = target.getAttribute("data-note-path");
      if (notePath) {
        handleNote(notePath);
      }
    }

    function isCtrlSpaceShortcut(event) {
      if (!event || !event.ctrlKey || event.metaKey || event.altKey) {
        return false;
      }
      var key = event.key;
      var code = event.code;
      return key === " " || key === "Spacebar" || (key === "Unidentified" && code === "Space") || code === "Space";
    }

    textarea.addEventListener("keydown", function (event) {
      if (!isCtrlSpaceShortcut(event)) {
        return;
      }
      if (event.repeat) {
        return;
      }
      event.preventDefault();
      event.stopPropagation();
      if (launcher.classList.contains("is-open")) {
        closeLauncher();
        return;
      }
      openLauncher();
    });

    document.addEventListener("keydown", function (event) {
      if (!launcher.classList.contains("is-open")) {
        return;
      }
      if (event.key === "Escape") {
        event.preventDefault();
        closeLauncher();
        return;
      }
      if (event.key === "Enter") {
        event.preventDefault();
        var items = listVisibleItems();
        if (!items.length) {
          return;
        }
        var index = activeIndex();
        handleItem(index >= 0 ? items[index] : items[0]);
        return;
      }
      if (event.key === "ArrowDown" || (event.ctrlKey && event.key === "j")) {
        event.preventDefault();
        moveActive(1);
        return;
      }
      if (event.key === "ArrowUp" || (event.ctrlKey && event.key === "k")) {
        event.preventDefault();
        moveActive(-1);
      }
    });

    list.addEventListener("click", function (event) {
      var target = event.target.closest(".quick-launcher__item");
      if (!target) {
        return;
      }
      event.preventDefault();
      handleItem(target);
    });

    input.addEventListener("input", function (event) {
      var value = event.target.value || "";
      if (value.trim() === "") {
        dynamic.innerHTML = "";
        dynamic.classList.add("hidden");
        filterDefaultActions("");
        clearActive();
        applyItemLimit();
        activateIndex(0);
        return;
      }
      filterDefaultActions(value);
      htmx.ajax("GET", "/quick/edit-actions?q=" + encodeURIComponent(value), "#note-edit-actions-dynamic");
    });

    document.body.addEventListener("htmx:afterSwap", function (event) {
      if (!event.target || event.target.id !== "note-edit-actions-dynamic") {
        return;
      }
      var hasItems = !!dynamic.querySelector(".quick-launcher__item");
      if (hasItems) {
        dynamic.classList.remove("hidden");
      } else {
        dynamic.classList.add("hidden");
      }
      clearActive();
      window.requestAnimationFrame(function () {
        applyItemLimit();
        activateIndex(0);
      });
    });

    launcher.addEventListener("click", function (event) {
      if (event.target === launcher) {
        closeLauncher();
      }
    });
  })();
</script>
<script>
  (function () {
    var textarea = document.getElementById("note-content");
    var suggest = document.getElementById("tag-suggest");
    if (!textarea || !suggest) {
      return;
    }
    var lastQuery = "";
    var lastPrefix = "";
    var lastOwner = "";
    var ownerSelect = document.getElementById("owner-select");
    function parseOwnerMap(scriptId) {
      var node = document.getElementById(scriptId);
      if (!node) {
        return {};
      }
      try {
        var parsed = JSON.parse(node.textContent || "{}");
        if (!parsed || typeof parsed !== "object") {
          return {};
        }
        return parsed;
      } catch (_err) {
        return {};
      }
    }
    var tagsByOwner = parseOwnerMap("tag-suggestions-by-owner-data");
    function currentOwner() {
      return ownerSelect ? ownerSelect.value : "";
    }
    function ownerTags(ownerName) {
      if (ownerName && Array.isArray(tagsByOwner[ownerName])) {
        return tagsByOwner[ownerName];
      }
      if (ownerName === "" && Array.isArray(tagsByOwner[""])) {
        return tagsByOwner[""];
      }
      return [];
    }
    function fuzzyMatch(term, candidate) {
      if (term === "") {
        return true;
      }
      var normalize = function (value) {
        return value.replace(/[^a-z0-9]+/g, "");
      };
      var subseq = function (needle, haystack) {
        var ni = 0;
        var hi = 0;
        while (ni < needle.length && hi < haystack.length) {
          if (needle.charAt(ni) === haystack.charAt(hi)) {
            ni += 1;
          }
          hi += 1;
        }
        return ni === needle.length;
      };
      var termClean = normalize(term);
      var candidateClean = normalize(candidate);
      if (subseq(termClean, candidateClean)) {
        return true;
      }
      var initials = candidate
        .split(/[^a-z0-9]+/g)
        .filter(Boolean)
        .map(function (part) {
          return part.charAt(0);
        })
        .join("");
      return subseq(termClean, initials);
    }
    function escapeHTML(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/\"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }
    function renderLocalTagSuggestions(term, ownerName) {
      var source = ownerTags(ownerName);
      if (!source.length) {
        return "";
      }
      var normalizedTerm = term.trim().toLowerCase();
      var matched = source.filter(function (tag) {
        return fuzzyMatch(normalizedTerm, String(tag || "").toLowerCase());
      }).slice(0, 25);
      if (!matched.length) {
        return "";
      }
      return matched.map(function (tag) {
        var safeTag = escapeHTML(tag);
        return '<button class="rounded-full border border-slate-700/70 bg-[#15181c] px-2.5 py-1 text-xs text-slate-200 hover:border-slate-500" type="button" data-tag="' + safeTag + '">#' + safeTag + '</button>';
      }).join("\n");
    }
    function findTokenStart(value, caret, prefix) {
      var idx = value.lastIndexOf(prefix, caret - 1);
      while (idx !== -1) {
        if (idx === 0 || /\s/.test(value.charAt(idx - 1))) {
          return idx;
        }
        idx = value.lastIndexOf(prefix, idx - 1);
      }
      return -1;
    }
    function currentTagQuery(value, caret) {
      var hash = findTokenStart(value, caret, "#");
      var at = findTokenStart(value, caret, "@");
      var start = Math.max(hash, at);
      if (start === -1) {
        return null;
      }
      var prefix = start === at ? "@" : "#";
      var term = value.slice(start + 1, caret);
      if (term.indexOf(" ") !== -1 || term.indexOf("\n") !== -1) {
        return null;
      }
      return { term: term, start: start, end: caret, prefix: prefix };
    }
    function buildMirror(textarea) {
      var div = document.createElement("div");
      var style = window.getComputedStyle(textarea);
      var properties = [
        "boxSizing",
        "borderTopWidth",
        "borderRightWidth",
        "borderBottomWidth",
        "borderLeftWidth",
        "paddingTop",
        "paddingRight",
        "paddingBottom",
        "paddingLeft",
        "fontStyle",
        "fontVariant",
        "fontWeight",
        "fontStretch",
        "fontSize",
        "lineHeight",
        "fontFamily",
        "textAlign",
        "textTransform",
        "letterSpacing",
        "wordSpacing",
        "textIndent",
        "tabSize",
      ];
      div.style.position = "absolute";
      div.style.visibility = "hidden";
      div.style.pointerEvents = "none";
      div.style.whiteSpace = "pre-wrap";
      div.style.wordWrap = "break-word";
      div.style.overflow = "hidden";
      properties.forEach(function (prop) {
        div.style[prop] = style[prop];
      });
      return div;
    }
    var mirror = buildMirror(textarea);
    document.body.appendChild(mirror);
    function getCaretCoordinates(caret) {
      mirror.style.width = textarea.offsetWidth + "px";
      mirror.style.height = textarea.offsetHeight + "px";
      mirror.textContent = textarea.value.substring(0, caret);
      var span = document.createElement("span");
      var nextChar = textarea.value.charAt(caret);
      span.textContent = nextChar ? nextChar : ".";
      mirror.appendChild(span);
      mirror.scrollTop = textarea.scrollTop;
      mirror.scrollLeft = textarea.scrollLeft;
      var left = span.offsetLeft - mirror.scrollLeft;
      var top = span.offsetTop - mirror.scrollTop;
      var height = span.offsetHeight;
      mirror.removeChild(span);
      return { left: left, top: top, height: height };
    }
    function positionSuggest() {
      var caret = textarea.selectionStart || 0;
      var coords = getCaretCoordinates(caret);
      var parentRect = textarea.parentElement.getBoundingClientRect();
      var rect = textarea.getBoundingClientRect();
      suggest.style.left = rect.left - parentRect.left + coords.left + "px";
      suggest.style.top = rect.top - parentRect.top + coords.top + coords.height + 6 + "px";
    }
    function updateSuggest() {
      var value = textarea.value;
      var caret = textarea.selectionStart || 0;
      var current = currentTagQuery(value, caret);
      if (!current) {
        lastQuery = "";
        lastPrefix = "";
        lastOwner = "";
        suggest.innerHTML = "";
        suggest.classList.add("hidden");
        suggest.removeAttribute("data-tag-start");
        suggest.removeAttribute("data-tag-end");
        suggest.removeAttribute("data-tag-prefix");
        return;
      }
      var ownerName = currentOwner();
      if (current.term === lastQuery && current.prefix === lastPrefix && ownerName === lastOwner && current.term !== "") {
        return;
      }
      lastQuery = current.term;
      lastPrefix = current.prefix;
      lastOwner = ownerName;
      suggest.dataset.tagStart = String(current.start);
      suggest.dataset.tagEnd = String(current.end);
      suggest.dataset.tagPrefix = current.prefix;
      positionSuggest();
      if (current.prefix === "#") {
        suggest.innerHTML = renderLocalTagSuggestions(current.term, ownerName);
        if (suggest.innerHTML.trim() === "") {
          suggest.classList.add("hidden");
          return;
        }
        suggest.classList.remove("hidden");
        return;
      }
      if (!window.htmx) {
        suggest.innerHTML = "";
        suggest.classList.add("hidden");
        return;
      }
      htmx.ajax("GET", "/users/suggest?q=" + encodeURIComponent(current.term), "#tag-suggest");
    }
    textarea.addEventListener("input", updateSuggest);
    textarea.addEventListener("click", updateSuggest);
    textarea.addEventListener("keyup", updateSuggest);
    textarea.addEventListener("keydown", function (event) {
      if (event.key !== "Enter") {
        return;
      }
      if (suggest.classList.contains("hidden")) {
        return;
      }
      var first = suggest.querySelector("[data-tag]");
      if (!first) {
        return;
      }
      event.preventDefault();
      var tag = first.getAttribute("data-tag");
      var start = Number(suggest.dataset.tagStart || "0");
      var end = Number(suggest.dataset.tagEnd || "0");
      var prefix = suggest.dataset.tagPrefix || "#";
      var insert = tag;
      var nextChar = textarea.value.charAt(end);
      if (!nextChar || !/\s/.test(nextChar)) {
        insert += " ";
      }
      textarea.setRangeText(insert, start + 1, end, "end");
      lastQuery = "";
      lastPrefix = prefix;
      suggest.innerHTML = "";
      suggest.classList.add("hidden");
    });
    suggest.addEventListener("click", function (event) {
      var target = event.target.closest("[data-tag]");
      if (!target) {
        return;
      }
      var tag = target.getAttribute("data-tag");
      var start = Number(suggest.dataset.tagStart || "0");
      var end = Number(suggest.dataset.tagEnd || "0");
      var prefix = suggest.dataset.tagPrefix || "#";
      var insert = tag;
      var nextChar = textarea.value.charAt(end);
      if (!nextChar || !/\s/.test(nextChar)) {
        insert += " ";
      }
      textarea.setRangeText(insert, start + 1, end, "end");
      textarea.focus();
      lastQuery = "";
      lastPrefix = prefix;
      suggest.innerHTML = "";
      suggest.classList.add("hidden");
    });
    document.addEventListener("gwiki:owner-change", function () {
      updateSuggest();
    });
    document.body.addEventListener("htmx:afterSwap", function (event) {
      if (event.target !== suggest) {
        return;
      }
      if (suggest.innerHTML.trim() === "") {
        suggest.classList.add("hidden");
        return;
      }
      suggest.classList.remove("hidden");
      positionSuggest();
    });
  })();
</script>
{{end}}
